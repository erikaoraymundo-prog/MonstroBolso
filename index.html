<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonstroBolso - Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <div id="start-screen">
            <div class="content">
                <h1>MonstroBolso</h1>
                <p>Prepare-se para a aventura!</p>
                <button id="start-button">Iniciar Jogo</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <!-- HUD and Menus will be here -->
            <div id="hud">
                <div id="pokedex-count">Captured: 0/151</div>
                <div id="badges">Badges: 0</div>
            </div>
            <div id="dialogue-box" class="hidden">
                <p id="dialogue-text"></p>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
